<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="edgeGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <radialGradient id="ballRadial" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="48" fill="url(#bg)"/>
  <g opacity="0.06">
    <line x1="0" y1="128" x2="512" y2="128" stroke="#22c55e" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#22c55e" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="#22c55e" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="#22c55e" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="#22c55e" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="#22c55e" stroke-width="1"/>
  </g>
  <g transform="translate(256, 195)">
    <circle cx="0" cy="0" r="86" fill="none" stroke="#f97316" stroke-width="2" opacity="0.2" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="80" fill="url(#ballRadial)"/>
    <path d="M-80,0 Q-40,-62 0,-72 Q40,-62 80,0" fill="none" stroke="#c2410c" stroke-width="3.5" opacity="0.8"/>
    <path d="M-80,0 Q-40,62 0,72 Q40,62 80,0" fill="none" stroke="#c2410c" stroke-width="3.5" opacity="0.8"/>
    <line x1="-80" y1="0" x2="80" y2="0" stroke="#c2410c" stroke-width="3.5" opacity="0.8"/>
    <line x1="0" y1="-80" x2="0" y2="80" stroke="#c2410c" stroke-width="3.5" opacity="0.8"/>
    <ellipse cx="-22" cy="-28" rx="20" ry="12" fill="white" opacity="0.12" transform="rotate(-20, -22, -28)"/>
  </g>
  <g transform="translate(310, 248)" filter="url(#softglow)">
    <polygon points="0,52 18,20 11,20 24,0 7,0 20,-22 0,-22 14,-44 -14,-44 0,-22 -20,-22 -7,0 -24,0 -11,20 -18,20" fill="url(#edgeGlow)" opacity="0.92"/>
  </g>
  <text x="256" y="356" font-family="Segoe UI, system-ui, sans-serif" font-size="72" font-weight="800" letter-spacing="-2" fill="white" text-anchor="middle">Court<tspan fill="url(#edgeGlow)">Edge</tspan></text>
  <rect x="96" y="370" width="320" height="2.5" rx="1.5" fill="url(#edgeGlow)" opacity="0.4"/>
  <text x="256" y="408" font-family="Segoe UI, system-ui, sans-serif" font-size="18" fill="#6b7280" letter-spacing="2.5" text-anchor="middle">NBA PREDICTION MARKET</text>
  <text x="256" y="432" font-family="Segoe UI, system-ui, sans-serif" font-size="18" fill="#4b5563" letter-spacing="2" text-anchor="middle">EDGE DETECTION BOT</text>
  <circle cx="48" cy="464" r="4" fill="#22c55e" opacity="0.5"/>
  <circle cx="62" cy="464" r="4" fill="#22c55e" opacity="0.3"/>
  <circle cx="464" cy="464" r="4" fill="#22c55e" opacity="0.5"/>
  <circle cx="450" cy="464" r="4" fill="#22c55e" opacity="0.3"/>
